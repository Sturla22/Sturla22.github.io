<style>
  :root {
    color-scheme: light dark;
    --gt-bg: #ffffff;
    --gt-bg-muted: #f8f9f8;
    --gt-bg-subtle: #f6faf6;
    --gt-bg-hover: #f7f8f7;
    --gt-bg-active: #f3f5f3;
    --gt-surface: #ffffff;
    --gt-surface-muted: #fcfcfc;
    --gt-border: #d8ddd8;
    --gt-border-strong: #c9d0c9;
    --gt-border-soft: #e2e6e2;
    --gt-text: #222222;
    --gt-text-muted: #596259;
    --gt-text-soft: #666666;
    --gt-text-faint: #888888;
    --gt-accent: #2a7a2a;
    --gt-accent-soft: #f8fcf7;
    --gt-accent-border: #8fc18f;
    --gt-danger: #c0392b;
    --gt-danger-bg: #f8d7da;
    --gt-danger-border: #f5c6cb;
    --gt-success-bg: #d4edda;
    --gt-success-border: #c3e6cb;
    --gt-shadow-ring: 0 0 0 3px rgba(42,122,42,0.12);
    --gt-table-head-bg: #f3f5f3;
    --gt-table-row-hover: #f7f8f7;
    --gt-table-subtle-bg: #f5f7f5;
    --gt-table-strong-bg: #eef1ee;
    --gt-table-input-bg: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --gt-bg: #111413;
      --gt-bg-muted: #171c19;
      --gt-bg-subtle: #171f19;
      --gt-bg-hover: #1a211d;
      --gt-bg-active: #202823;
      --gt-surface: #151917;
      --gt-surface-muted: #181d1a;
      --gt-border: #2a322d;
      --gt-border-strong: #39443d;
      --gt-border-soft: #242c27;
      --gt-text: #edf2ed;
      --gt-text-muted: #c5d0c6;
      --gt-text-soft: #a6b2a7;
      --gt-text-faint: #859286;
      --gt-accent: #4a8550;
      --gt-accent-soft: #161f18;
      --gt-accent-border: #355c3a;
      --gt-danger: #ff8c84;
      --gt-danger-bg: #311819;
      --gt-danger-border: #5a2e30;
      --gt-success-bg: #16301b;
      --gt-success-border: #2a5a34;
      --gt-shadow-ring: 0 0 0 3px rgba(74,133,80,0.12);
      --gt-table-head-bg: #141917;
      --gt-table-row-hover: #171d19;
      --gt-table-subtle-bg: #131816;
      --gt-table-strong-bg: #191f1b;
      --gt-table-input-bg: #121715;
      --gt-stats-card-bg: #131715;
      --gt-stats-card-border: #222a25;
      --gt-stats-panel-bg: #121614;
      --gt-stats-track-bg: #191e1b;
    }
  }

  .golf-tracker {
    font-family: inherit;
    max-width: 900px;
    margin: 0 auto;
    color: var(--gt-text);
    background: var(--gt-bg);
  }

  body:has(.golf-tracker),
  body:has(.golf-tracker) .page-content,
  body:has(.golf-tracker) .page-content > .wrapper {
    background: var(--gt-bg);
    color: var(--gt-text);
  }

  .gt-tabs {
    display: flex;
    gap: 0.35rem;
    border-bottom: 2px solid var(--gt-border);
    margin-bottom: 1.5rem;
    overflow-x: auto;
    padding-bottom: 0.25rem;
    scrollbar-width: none;
  }
  .gt-tabs::-webkit-scrollbar { display: none; }

  .gt-tab {
    padding: 0.62rem 0.95rem;
    cursor: pointer;
    border: 1px solid var(--gt-border);
    border-radius: 999px;
    background: var(--gt-surface);
    font-size: 0.9rem;
    color: var(--gt-text-muted);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
    font-family: inherit;
    appearance: none;
    -webkit-appearance: none;
    margin: 0;
  }
  .gt-tab-short { display: none; }
  @media (max-width: 480px) {
    .gt-tab { padding: 0.55rem 0.72rem; font-size: 0.8rem; }
    .gt-tab-full { display: none; }
    .gt-tab-short { display: inline; }
  }

  .gt-tab:hover { background: var(--gt-bg-hover); border-color: var(--gt-border-strong); }

  .gt-tab.active {
    background: var(--gt-bg-subtle);
    border-color: var(--gt-accent);
    color: var(--gt-text);
    font-weight: 600;
  }

  .gt-panel { display: none; }
  .gt-panel.active { display: block; }

  /* Form */
  .gt-form {
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .gt-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .gt-field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .gt-field label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gt-text-soft);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .gt-field input,
  .gt-field select,
  .gt-field textarea {
    padding: 0.6rem 0.7rem;
    border: 1px solid var(--gt-border);
    border-radius: 6px;
    font-size: 1rem;
    width: 100%;
    box-sizing: border-box;
    background: var(--gt-surface);
    color: var(--gt-text);
    -webkit-appearance: none;
    appearance: none;
  }

  .gt-field textarea { resize: vertical; min-height: 60px; }
  .gt-field-primary label { color: var(--gt-accent); }
  .gt-unit {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--gt-text-faint);
  }
  .gt-help-text {
    font-size: 0.82rem;
    color: var(--gt-text-soft);
    margin: 0;
  }
  .gt-help-text-small {
    font-size: 0.78rem;
    color: var(--gt-text-faint);
    margin: 0.3rem 0 0;
  }
  .gt-note-inline {
    font-size: 0.75rem;
    color: var(--gt-text-faint);
    margin-top: 0.2rem;
  }
  .gt-course-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    background: var(--gt-surface);
    border: 1px solid var(--gt-border-soft);
    border-radius: 6px;
    padding: 0.55rem 0.8rem;
    margin-bottom: 0.8rem;
    font-size: 0.88rem;
  }
  .gt-course-bar-label {
    font-weight: 700;
    color: var(--gt-text-muted);
    white-space: nowrap;
  }
  .gt-course-bar-control {
    flex: 1;
    min-width: 140px;
    padding: 0.3rem 0.5rem;
    border: 1px solid var(--gt-border);
    border-radius: 4px;
    font-size: 0.88rem;
    background: var(--gt-surface);
    color: var(--gt-text);
  }
  .gt-course-bar-new {
    border-color: var(--gt-accent);
  }
  .gt-course-bar-meta {
    font-size: 0.8rem;
    color: var(--gt-text-soft);
    white-space: nowrap;
  }
  .gt-distance-input {
    min-height: 58px;
    font-size: 1.25rem;
    font-weight: 700;
    border-width: 2px;
    border-color: var(--gt-border);
    background: var(--gt-surface);
  }
  .gt-field input.gt-suggested,
  .gt-field select.gt-suggested,
  .gt-pill.gt-suggested,
  .gt-dpad-btn.gt-suggested {
    box-shadow: var(--gt-shadow-ring);
    border-color: var(--gt-accent-border);
  }
  .gt-field input.gt-suggested {
    background: var(--gt-accent-soft);
  }
  .gt-pill.gt-suggested:not(.selected) {
    background: var(--gt-accent-soft);
    color: var(--gt-accent);
  }
  .gt-dpad-btn.gt-suggested:not(.selected) { border-color: var(--gt-accent-border); }

  /* Stepper for hole number */
  .gt-num-input {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--gt-border);
    border-radius: 6px;
    overflow: hidden;
  }

  .gt-num-input input {
    flex: 1;
    border: none;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    padding: 0.55rem 0;
    min-width: 0;
    background: var(--gt-surface);
    color: var(--gt-text);
    -moz-appearance: textfield;
  }

  .gt-num-input input::-webkit-outer-spin-button,
  .gt-num-input input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .gt-num-btn {
    background: var(--gt-bg-muted);
    border: none;
    padding: 0;
    width: 48px;
    flex-shrink: 0;
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    color: var(--gt-text);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }

  .gt-num-btn:active { background: var(--gt-bg-active); }

  .gt-btn {
    padding: 0.65rem 1.2rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    transition: opacity 0.15s;
    touch-action: manipulation;
    min-height: 44px;
  }

  .gt-btn:hover { opacity: 1; }
  .gt-btn-primary { background: var(--gt-accent); color: #fff; }
  .gt-btn-secondary { background: #555; color: #fff; }
  .gt-btn-danger { background: #c0392b; color: #fff; }
  .gt-btn-outline { background: var(--gt-surface); border: 1px solid var(--gt-border); color: var(--gt-text-muted); }
  .gt-stats-filter-btn.active { background: var(--gt-accent); border-color: var(--gt-accent); color: #fff; }
  .gt-indoor-btn { font-size: 0.8rem; padding: 0.25rem 0.65rem; border-radius: 4px; cursor: pointer; border: 1px solid var(--gt-border); background: var(--gt-surface); color: var(--gt-text-muted); white-space: nowrap; }
  .gt-indoor-btn.indoor { background: #1a5fa8; border-color: #1a5fa8; color: #fff; }
  .gt-tee-row { background: var(--gt-surface); border: 1px solid var(--gt-border-soft); border-radius: 6px; padding: 0.6rem 0.75rem; margin-bottom: 0.5rem; }
  .gt-tee-len-inp { width: 100%; padding: 0.3rem; border: 1px solid var(--gt-border); border-radius: 4px; font-size: 0.85rem; text-align: center; box-sizing: border-box; background: var(--gt-surface); color: var(--gt-text); }
  .gt-tee-ctx-sel { padding: 0.3rem 0.5rem; border: 1px solid var(--gt-border); border-radius: 4px; font-size: 0.85rem; background: var(--gt-surface); color: var(--gt-text); }

  .gt-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .gt-actions-sticky {
    position: sticky;
    bottom: 0.5rem;
    z-index: 4;
    padding: 0.65rem;
    border-radius: 12px;
    background: color-mix(in srgb, var(--gt-surface) 92%, transparent);
    border: 1px solid var(--gt-border-soft);
  }
  .gt-btn-compact {
    padding: 0.55rem 0.8rem;
    min-height: 40px;
    font-size: 0.92rem;
    font-weight: 600;
    flex: 0 0 auto;
  }
  .gt-btn-save {
    min-width: 0;
  }

  /* Pill selects */
  .gt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
  }

  .gt-pill {
    padding: 0.55rem 0.9rem;
    border: 1px solid var(--gt-border);
    border-radius: 22px;
    cursor: pointer;
    font-size: 0.9rem;
    background: var(--gt-surface);
    transition: all 0.15s;
    user-select: none;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    touch-action: manipulation;
    box-sizing: border-box;
  }

  .gt-pill:hover { border-color: var(--gt-border-strong); background: var(--gt-bg-hover); }
  .gt-pill.selected { background: var(--gt-accent); border-color: var(--gt-accent); color: #fff; }

  /* Club grid */
  .gt-club-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4rem;
  }
  .gt-club-group-label {
    grid-column: 1 / -1;
    margin-top: 0.25rem;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gt-text-faint);
  }

  .gt-club-pill {
    padding: 0.5rem 0.2rem;
    font-size: 0.88rem;
    min-height: 42px;
    border-radius: 8px;
    justify-content: center;
    text-align: center;
  }

  /* Section sub-header */
  .gt-section-sub {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gt-accent);
    padding: 0.4rem 0 0.1rem;
    border-top: 2px solid var(--gt-border-soft);
    margin-top: 0.1rem;
  }

  /* "Add details" toggle */
  .gt-more-toggle {
    background: var(--gt-surface);
    border: 1px solid var(--gt-border-soft);
    border-radius: 6px;
    padding: 0.65rem 1rem;
    font-size: 0.88rem;
    color: var(--gt-text-muted);
    cursor: pointer;
    width: 100%;
    text-align: left;
    touch-action: manipulation;
  }

  .gt-more-toggle:active { background: var(--gt-bg-hover); }

  .gt-caddie-toggle {
    margin-top: -0.1rem;
  }

  .gt-caddie-section {
    padding: 0.9rem 0 0.2rem;
  }

  .gt-caddie-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
  }

  .gt-caddie-select {
    width: 100%;
    min-height: 44px;
    padding: 0.65rem 0.75rem;
    border: 1px solid var(--gt-border);
    border-radius: 8px;
    background: var(--gt-surface);
    color: var(--gt-text);
    font: inherit;
  }

  .gt-caddie-select:disabled,
  .gt-caddie-select-disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .gt-caddie-summary {
    margin-top: 0.8rem;
    padding: 0.9rem 1rem;
    border: 1px solid var(--gt-border-soft);
    border-radius: 12px;
    background: var(--gt-bg-muted);
  }

  .gt-caddie-metric {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
  }

  .gt-caddie-label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gt-text-faint);
  }

  .gt-caddie-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--gt-text);
  }

  .gt-caddie-meta {
    margin-top: 0.4rem;
    font-size: 0.88rem;
    color: var(--gt-text-soft);
  }

  .gt-caddie-apply {
    margin-top: 0.75rem;
    width: 100%;
    justify-content: center;
  }

  .gt-caddie-apply:disabled {
    opacity: 0.55;
    cursor: default;
  }

  .gt-putt-section {
    margin-top: 0.2rem;
  }

  .gt-putt-section-sub {
    margin-bottom: 0.55rem;
  }

  .gt-shot-status-card {
    background: var(--gt-surface);
    border: 1px solid var(--gt-border-soft);
    border-radius: 14px;
    padding: 0.8rem 0.95rem;
    margin-bottom: 0.9rem;
  }
  .gt-shot-progress-kicker {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gt-text-faint);
    margin-bottom: 0.2rem;
  }
  .gt-shot-progress-main {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gt-text);
  }
  #gt-shot-status {
    font-size: 0.84rem;
    color: var(--gt-text-soft);
    margin-top: 0.25rem;
  }
  .gt-quick-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.5rem;
  }
  .gt-quick-btn {
    font-size: 0.86rem;
    padding: 0.6rem 0.75rem;
  }

  /* Directional result pad */
  .gt-dpad {
    position: relative;
    width: 244px;
    height: 220px;
    margin: 0.2rem 0 0.1rem;
  }

  .gt-dpad-btn {
    position: absolute;
    width: 68px;
    height: 54px;
    border: 1px solid var(--gt-border);
    border-radius: 20px;
    background: var(--gt-surface);
    cursor: pointer;
    padding: 0.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.05rem;
    touch-action: manipulation;
    user-select: none;
    text-align: center;
    color: var(--gt-text-soft);
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }

  .gt-dpad-btn:hover { border-color: var(--gt-border-strong); background: var(--gt-bg-hover); }
  .gt-dpad-btn:active {
    background: var(--gt-bg-active);
  }
  .gt-dpad-btn.selected {
    background: var(--gt-accent);
    border-color: var(--gt-accent);
    color: #fff;
  }
  .gt-dpad-arrow { font-size: 1.35rem; line-height: 1; }
  .gt-dpad-label { font-size: 0.62rem; color: var(--gt-text-faint); line-height: 1.1; text-align: center; }
  .gt-dpad-btn.selected .gt-dpad-label { color: rgba(255,255,255,0.8); }
  .gt-dpad-btn:not(.gt-dpad-center) .gt-dpad-label {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .gt-dpad-long { top: 16px; left: 88px; }
  .gt-dpad-left { top: 82px; left: 16px; }
  .gt-dpad-center {
    top: 82px;
    left: 90px;
    width: 60px;
    height: 60px;
    border-radius: 999px;
    background: var(--gt-surface);
    border-color: var(--gt-accent-border);
  }
  .gt-dpad-center .gt-dpad-arrow { font-size: 1rem; }
  .gt-dpad-center .gt-dpad-label { font-size: 0.68rem; font-weight: 700; }
  .gt-dpad-right { top: 82px; left: 160px; }
  .gt-dpad-short { top: 148px; left: 88px; }
  .gt-dpad-center.selected {
    background: var(--gt-accent);
    border-color: var(--gt-accent);
  }
  @media (max-width: 420px) {
    .gt-dpad {
      width: 220px;
      height: 198px;
    }
    .gt-dpad-btn {
      width: 62px;
      height: 50px;
    }
    .gt-dpad-long { top: 14px; left: 79px; }
    .gt-dpad-left { top: 74px; left: 12px; }
    .gt-dpad-center { top: 74px; left: 81px; width: 56px; height: 56px; }
    .gt-dpad-right { top: 74px; left: 146px; }
    .gt-dpad-short { top: 134px; left: 79px; }
  }

  /* Table */
  .gt-table-wrap { overflow-x: auto; }

  .gt-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
    color: var(--gt-text);
  }

  .golf-tracker .gt-table tr,
  .golf-tracker .gt-sg-table tr,
  .golf-tracker .gt-scorecard tr,
  .golf-tracker .gt-club-dist-table tr {
    background: transparent;
  }

  .golf-tracker .gt-table tr:nth-child(even),
  .golf-tracker .gt-sg-table tr:nth-child(even),
  .golf-tracker .gt-scorecard tr:nth-child(even),
  .golf-tracker .gt-club-dist-table tr:nth-child(even) {
    background: transparent;
  }

  .gt-table th {
    background: var(--gt-table-head-bg);
    padding: 0.5rem 0.6rem;
    text-align: left;
    border-bottom: 2px solid var(--gt-border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  .gt-table th:hover { background: var(--gt-table-row-hover); }

  .gt-table td {
    padding: 0.45rem 0.6rem;
    border-bottom: 1px solid var(--gt-border-soft);
    vertical-align: top;
    background: transparent;
  }

  .gt-table tr:hover td { background: var(--gt-table-row-hover); }

  .gt-delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gt-danger);
    font-size: 1rem;
    padding: 0 0.2rem;
  }

  .gt-empty {
    text-align: center;
    color: var(--gt-text-faint);
    padding: 2rem;
    font-style: italic;
  }

  /* Stats */
  .gt-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .gt-stats-grid-summary {
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    margin-bottom: 1rem;
  }

  .gt-stats-grid-spotlight {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    margin-bottom: 0;
  }

  .gt-stats-grid-compact {
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    margin-top: 1rem;
    margin-bottom: 1rem;
  }

  .gt-stats-hero {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(260px, 1fr);
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .gt-analysis-deck {
    display: grid;
    grid-template-columns: 1.1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .gt-analysis-card {
    background: var(--gt-stats-card-bg, var(--gt-surface));
    border: 1px solid var(--gt-stats-card-border, var(--gt-border-soft));
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }

  .gt-analysis-card-sg {
    display: flex;
    flex-direction: column;

  .gt-bar-label { width: 90px; flex-shrink: 0; text-align: right; color: var(--gt-text-muted); }

  .gt-bar-track {

  .gt-bar-fill {
    height: 100%;

  .gt-bar-count { width: 30px; color: var(--gt-text-muted); }

  /* IO area */

  .gt-scorecard .sc-hole-label { text-align: left; font-weight: 700; }

  .gt-sc-stat {

    margin-bottom: 0.4rem;
